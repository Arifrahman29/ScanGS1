<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS1 Scanner PRO - QUAGGA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:#fff;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.header{text-align:center;margin-bottom:15px;}
.header h1{color:#38bdf8;font-size:22px;}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:16px;
    padding:15px;
    margin-bottom:15px;
}

#scanner{
    width:100%;
    height:250px;
    border-radius:12px;
    overflow:hidden;
}

.stats{
    display:flex;
    justify-content:space-between;
}

.stat-box{
    flex:1;
    margin:5px;
    background:#0ea5e9;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-weight:bold;
}

.export{background:#22c55e;}
.reset{background:#ef4444;}
.capture{background:#f59e0b;}

.upload{
    background:#334155;
    text-align:center;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🔥 GS1 Scanner PRO (QUAGGA)</h1>
</div>

<div class="card">
<div id="scanner"></div>
</div>

<div class="card">
<div class="stats">
<div class="stat-box">Box<br><strong id="box">0</strong></div>
<div class="stat-box">Kg<br><strong id="kg">0</strong></div>
</div>
</div>

<button class="capture" onclick="captureScan()">📸 FOTO & SCAN</button>

<div class="upload">
<input type="file" accept="image/*" onchange="scanImage(event)">
</div>

<button class="export" onclick="exportExcel()">EXPORT EXCEL</button>
<button class="reset" onclick="reset()">RESET</button>

</div>

<script>
let dataScan=[];
let totalKg=0;

function parseGS1(barcode){
    barcode=barcode.replace(/\(|\)/g,"");
    let i=0,result={};

    while(i<barcode.length){
        let ai=barcode.substring(i,i+2);

        if(ai==="01"){
            result.gtin=barcode.substring(i+2,i+16);
            i+=16;
        }
        else if(barcode.substring(i,i+3)==="310"){
            let decimal=parseInt(barcode[i+3]);
            let raw=barcode.substring(i+4,i+10);
            result.weight=parseInt(raw)/Math.pow(10,decimal);
            i+=10;
        }
        else if(ai==="21"){
            result.serial=barcode.substring(i+2);
            break;
        }
        else{break;}
    }
    return result;
}

// 🔥 START QUAGGA (REALTIME LEBIH KUAT)
Quagga.init({
    inputStream:{
        type:"LiveStream",
        target:document.querySelector('#scanner'),
        constraints:{
            facingMode:"environment",
            width:1280,
            height:720
        }
    },
    locator:{
        patchSize:"medium",
        halfSample:false
    },
    numOfWorkers:4,
    frequency:10,
    decoder:{
        readers:[
            "code_128_reader",
            "ean_reader"
        ]
    },
    locate:true
},function(err){
    if(err){console.log(err);return;}
    Quagga.start();
});

// 🔥 HANDLE SCAN
Quagga.onDetected(function(data){
    let code=data.codeResult.code;

    let parsed=parseGS1(code);

    if(parsed.weight){
        dataScan.push(parsed);
        totalKg+=parsed.weight;

        document.getElementById("box").innerText=dataScan.length;
        document.getElementById("kg").innerText=totalKg.toFixed(2);

        new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3").play();
        if(navigator.vibrate) navigator.vibrate(200);
    }
});

// 📸 FOTO REAL CAMERA
function captureScan(){
    const input=document.createElement("input");
    input.type="file";
    input.accept="image/*";
    input.capture="environment";

    input.onchange=function(e){
        scanImage(e);
    };

    input.click();
}

// UPLOAD IMAGE
function scanImage(event){
    const file=event.target.files[0];
    if(!file) return;

    const reader=new FileReader();

    reader.onload=function(e){
        Quagga.decodeSingle({
            src:e.target.result,
            numOfWorkers:0,
            decoder:{
                readers:["code_128_reader","ean_reader"]
            }
        },function(result){
            if(result && result.codeResult){
                let parsed=parseGS1(result.codeResult.code);
                if(parsed.weight){
                    dataScan.push(parsed);
                    totalKg+=parsed.weight;

                    document.getElementById("box").innerText=dataScan.length;
                    document.getElementById("kg").innerText=totalKg.toFixed(2);
                }
            }else{
                alert("Barcode tidak terbaca");
            }
        });
    };

    reader.readAsDataURL(file);
}

// RESET
function reset(){
    dataScan=[];
    totalKg=0;
    document.getElementById("box").innerText=0;
    document.getElementById("kg").innerText=0;
}

// EXPORT EXCEL
function exportExcel(){
    let wb=XLSX.utils.book_new();
    let ws_data=[];

    ws_data.push(["TALLY SHEET"]);
    ws_data.push([]);

    let i=0;
    for(let r=0;r<10;r++){
        let row=[];
        for(let c=0;c<10;c++){
            row.push(dataScan[i]?dataScan[i].weight:"");
            i++;
        }
        ws_data.push(row);
    }

    ws_data.push([]);
    ws_data.push(["TOTAL",dataScan.length,"BOX",totalKg,"KG"]);

    let ws=XLSX.utils.aoa_to_sheet(ws_data);
    XLSX.utils.book_append_sheet(wb,ws,"Tally");
    XLSX.writeFile(wb,"tally.xlsx");
}
</script>

</body>
</html>

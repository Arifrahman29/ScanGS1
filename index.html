<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS1 Scanner PRO MAX AI FINAL</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:#fff;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.header{text-align:center;margin-bottom:15px;}
.header h1{color:#38bdf8;font-size:22px;}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:16px;
    padding:15px;
    margin-bottom:15px;
}

.video-wrap{position:relative;}

video{
    width:100%;
    border-radius:12px;
}

.scan-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    height:140px;
    border:3px dashed #22c55e;
    border-radius:10px;
}

canvas{display:none;}

.stats{
    display:flex;
    justify-content:space-between;
}

.stat-box{
    flex:1;
    margin:5px;
    background:#0ea5e9;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-weight:bold;
}

.export{background:#22c55e;}
.reset{background:#ef4444;}

.upload{
    background:#334155;
    text-align:center;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🔥 GS1 Scanner PRO MAX AI FINAL</h1>
</div>

<div class="card video-wrap">
<video id="video" autoplay muted playsinline></video>
<div class="scan-box"></div>
<canvas id="canvas"></canvas>
</div>

<div class="card">
<div class="stats">
<div class="stat-box">Box<br><strong id="box">0</strong></div>
<div class="stat-box">Kg<br><strong id="kg">0</strong></div>
</div>
</div>

<div class="upload">
<input type="file" accept="image/*" onchange="scanImage(event)">
</div>

<button class="export" onclick="exportExcel()">EXPORT EXCEL</button>
<button class="reset" onclick="reset()">RESET</button>

</div>

<script>
let dataScan=[];
let totalKg=0;

function parseGS1(barcode){
    barcode=barcode.replace(/\(|\)/g,"");
    let i=0,result={};

    while(i<barcode.length){
        let ai=barcode.substring(i,i+2);

        if(ai==="01"){
            result.gtin=barcode.substring(i+2,i+16);
            i+=16;
        }
        else if(barcode.substring(i,i+3)==="310"){
            let decimal=parseInt(barcode[i+3]);
            let raw=barcode.substring(i+4,i+10);
            result.weight=parseInt(raw)/Math.pow(10,decimal);
            i+=10;
        }
        else if(ai==="21"){
            result.serial=barcode.substring(i+2);
            break;
        }
        else{break;}
    }
    return result;
}

const codeReader = new ZXing.BrowserMultiFormatReader();

// CAMERA
navigator.mediaDevices.getUserMedia({
    video:{
        facingMode:{ideal:"environment"},
        width:{ideal:1920},
        height:{ideal:1080}
    }
}).then(stream=>{
    const video=document.getElementById("video");
    video.srcObject=stream;
    video.play();
    autoScan(video);
});

// AUTO SCAN CAMERA
function autoScan(video){
    const canvas=document.getElementById("canvas");
    const ctx=canvas.getContext("2d");

    setInterval(()=>{
        if(video.readyState===4){

            canvas.width=video.videoWidth;
            canvas.height=video.videoHeight;

            let w=canvas.width*0.8;
            let h=canvas.height*0.25;
            let x=(canvas.width-w)/2;
            let y=(canvas.height-h)/2;

            ctx.drawImage(video,x,y,w,h,0,0,w,h);

            let imgData=ctx.getImageData(0,0,w,h);

            for(let i=0;i<imgData.data.length;i+=4){
                let avg=(imgData.data[i]+imgData.data[i+1]+imgData.data[i+2])/3;
                let val=avg>120?255:0;
                imgData.data[i]=val;
                imgData.data[i+1]=val;
                imgData.data[i+2]=val;
            }

            ctx.putImageData(imgData,0,0);

            codeReader.decodeFromImage(undefined, canvas.toDataURL())
            .then(result=>{
                handleResult(result.text);
            })
            .catch(()=>{});
        }
    },500);
}

// SCAN UPLOAD IMAGE
function scanImage(event){
    const file=event.target.files[0];
    if(!file) return;

    const img=new Image();
    const reader=new FileReader();

    reader.onload=e=>img.src=e.target.result;

    img.onload=function(){
        const canvas=document.getElementById("canvas");
        const ctx=canvas.getContext("2d");

        canvas.width=img.width;
        canvas.height=img.height;

        ctx.drawImage(img,0,0);

        codeReader.decodeFromImage(undefined, canvas.toDataURL())
        .then(result=>{
            handleResult(result.text);
        })
        .catch(()=>{
            alert("Barcode tidak terbaca, pastikan jelas & dekat");
        });
    }

    reader.readAsDataURL(file);
}

// HANDLE RESULT
function handleResult(text){
    let parsed=parseGS1(text);

    if(parsed.weight){
        dataScan.push(parsed);
        totalKg+=parsed.weight;

        document.getElementById("box").innerText=dataScan.length;
        document.getElementById("kg").innerText=totalKg.toFixed(2);

        new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3").play();
        if(navigator.vibrate) navigator.vibrate(200);
    }
}

// RESET
function reset(){
    dataScan=[];
    totalKg=0;
    document.getElementById("box").innerText=0;
    document.getElementById("kg").innerText=0;
}

// EXPORT EXCEL
function exportExcel(){
    let wb=XLSX.utils.book_new();
    let ws_data=[];

    ws_data.push(["TALLY SHEET"]);
    ws_data.push([]);

    let i=0;
    for(let r=0;r<10;r++){
        let row=[];
        for(let c=0;c<10;c++){
            row.push(dataScan[i]?dataScan[i].weight:"");
            i++;
        }
        ws_data.push(row);
    }

    ws_data.push([]);
    ws_data.push(["TOTAL",dataScan.length,"BOX",totalKg,"KG"]);

    let ws=XLSX.utils.aoa_to_sheet(ws_data);
    XLSX.utils.book_append_sheet(wb,ws,"Tally");
    XLSX.writeFile(wb,"tally.xlsx");
}
</script>

</body>
</html>
